<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Struk Kasir</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Panel Input (Kiri) -->
        <div class="panel-input" id="panelInput">
            <div>
                <h2>🧾 Generator Struk Kasir</h2>
                <p class="subtitle">Isi data di bawah, preview struk akan tampil real-time di sebelah kanan.</p>
            </div>

            <!-- Pilihan Template -->
            <div class="section-card">
                <h3>📐 Pilih Template Struk</h3>
                <div class="form-row">
                    <div class="form-group" style="flex:1 1 250px;">
                        <label for="templateSelect">Format Struk</label>
                        <select id="templateSelect">
                            <option value="umum">1. Struk Umum (Standar)</option>
                            <option value="rumahmakan">2. Rumah Makan (+ Nomor Meja & Nama Pelanggan)</option>
                            <option value="minimarket">3. Mini Market (Thermal Monospace Kaku)</option>
                            <option value="apotek">4. Apotek (+ SIPA/SIPB & Nama Apoteker)</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Informasi Toko -->
            <div class="section-card">
                <h3>🏪 Informasi Toko</h3>
                <div class="form-row">
                    <div class="form-group" style="flex:1 1 200px;">
                        <label for="namaToko">Nama Toko *</label>
                        <input type="text" id="namaToko" placeholder="Contoh: Toko Berkah Jaya" value="Toko Berkah Jaya">
                    </div>
                    <div class="form-group" style="flex:1 1 140px;">
                        <label for="telpToko">Nomor Telepon</label>
                        <input type="text" id="telpToko" placeholder="Contoh: (021) 1234567" value="(021) 555-7890">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group" style="flex:1 1 100%;">
                        <label for="alamatToko">Alamat Toko</label>
                        <input type="text" id="alamatToko" placeholder="Contoh: Jl. Merdeka No. 45, Jakarta" value="Jl. Merdeka No. 45, Jakarta Pusat">
                    </div>
                </div>
            </div>

            <!-- Waktu Transaksi -->
            <div class="section-card">
                <h3>📅 Waktu Transaksi</h3>
                <div class="form-row">
                    <div class="form-group" style="flex:1 1 130px;">
                        <label for="tanggalTransaksi">Tanggal</label>
                        <input type="date" id="tanggalTransaksi">
                    </div>
                    <div class="form-group" style="flex:1 1 110px;">
                        <label for="jamTransaksi">Jam</label>
                        <input type="time" id="jamTransaksi" step="1">
                    </div>
                    <div class="form-group" style="flex:0 0 auto; align-self: flex-end;">
                        <button class="btn btn-outline btn-sm" id="btnAutoFill" title="Isi dengan waktu saat ini">
                            ⏱ Auto-Fill Sekarang
                        </button>
                    </div>
                </div>
            </div>

            <!-- Informasi Transaksi -->
            <div class="section-card">
                <h3>🧾 Informasi Transaksi</h3>
                <div class="form-row">
                    <div class="form-group" style="flex:1 1 160px;">
                        <label for="nomorStruk">Nomor Struk / Resi</label>
                        <input type="text" id="nomorStruk" placeholder="Contoh: INV-20260501-001" value="INV-20260501-001">
                    </div>
                    <div class="form-group" style="flex:1 1 140px;">
                        <label for="namaKasir">Nama Kasir</label>
                        <input type="text" id="namaKasir" placeholder="Contoh: Budi Santoso" value="Budi Santoso">
                    </div>
                </div>

                <!-- Field khusus Rumah Makan -->
                <div class="template-fields" id="fieldsRumahMakan">
                    <div class="form-row">
                        <div class="form-group" style="flex:1 1 120px;">
                            <label for="nomorMeja">Nomor Meja</label>
                            <input type="text" id="nomorMeja" placeholder="Contoh: Meja 5" value="Meja 5">
                        </div>
                        <div class="form-group" style="flex:1 1 160px;">
                            <label for="namaPelanggan">Nama Pelanggan</label>
                            <input type="text" id="namaPelanggan" placeholder="Contoh: Ibu Ani" value="Ibu Ani">
                        </div>
                    </div>
                </div>

                <!-- Field khusus Apotek -->
                <div class="template-fields" id="fieldsApotek">
                    <div class="form-row">
                        <div class="form-group" style="flex:1 1 150px;">
                            <label for="sipaSipb">SIPA / SIPB</label>
                            <input type="text" id="sipaSipb" placeholder="Contoh: SIPA-2025/XYZ/00123" value="SIPA-2025/JKT/00891">
                        </div>
                        <div class="form-group" style="flex:1 1 160px;">
                            <label for="namaApoteker">Nama Apoteker</label>
                            <input type="text" id="namaApoteker" placeholder="Contoh: apt. Dewi Lestari, S.Farm." value="apt. Dewi Lestari, S.Farm.">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Input Item Barang -->
            <div class="section-card">
                <h3>🛒 Item Barang</h3>
                <div class="form-row">
                    <div class="form-group" style="flex:2 1 180px;">
                        <label for="itemNama">Nama Item</label>
                        <input type="text" id="itemNama" placeholder="Contoh: Beras Premium 5kg">
                    </div>
                    <div class="form-group" style="flex:0.7 1 70px;">
                        <label for="itemQty">Jumlah (Qty)</label>
                        <input type="number" id="itemQty" min="1" value="1" placeholder="1">
                    </div>
                    <div class="form-group" style="flex:1 1 120px;">
                        <label for="itemHarga">Harga Satuan (Rp)</label>
                        <input type="number" id="itemHarga" min="0" placeholder="10000">
                    </div>
                    <div class="form-group" style="flex:0 0 auto; align-self: flex-end;">
                        <button class="btn btn-primary" id="btnTambahItem">➕ Tambah Item</button>
                    </div>
                </div>
                <!-- Tabel daftar item -->
                <div class="items-table-wrap" id="itemsTableWrap">
                    <table class="items-table" id="itemsTable">
                        <thead>
                            <tr>
                                <th style="width:5%;">#</th>
                                <th style="width:32%;">Nama Item</th>
                                <th style="width:12%;" class="text-center">Qty</th>
                                <th style="width:22%;" class="text-right">Harga Satuan</th>
                                <th style="width:20%;" class="text-right">Total</th>
                                <th style="width:9%;" class="text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="itemsTableBody"></tbody>
                    </table>
                </div>
                <p class="text-muted" style="font-size:0.72rem; margin-top:4px;" id="emptyItemsMsg">Belum ada item.</p>
            </div>

            <!-- Perhitungan -->
            <div class="section-card">
                <h3>💰 Perhitungan</h3>
                <div class="form-row">
                    <div class="form-group" style="flex:1 1 130px;">
                        <label>Subtotal</label>
                        <input type="text" id="subtotalDisplay" readonly value="Rp 0">
                    </div>
                    <div class="form-group" style="flex:0.8 1 100px;">
                        <label for="diskonTipe">Tipe Diskon</label>
                        <select id="diskonTipe">
                            <option value="persen">Persentase (%)</option>
                            <option value="nominal">Nominal (Rp)</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex:1 1 120px;">
                        <label for="diskonValue">Diskon</label>
                        <input type="number" id="diskonValue" min="0" value="0" placeholder="0">
                    </div>
                    <div class="form-group" style="flex:0.7 1 90px;">
                        <label for="ppnValue">PPN (%)</label>
                        <input type="number" id="ppnValue" min="0" max="100" value="11" placeholder="11">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group" style="flex:1 1 140px;">
                        <label>Total Akhir</label>
                        <input type="text" id="totalAkhirDisplay" readonly value="Rp 0">
                    </div>
                    <div class="form-group" style="flex:1 1 150px;">
                        <label for="uangTunai">Uang Tunai (Pembayaran)</label>
                        <input type="number" id="uangTunai" min="0" value="0" placeholder="0">
                    </div>
                    <div class="form-group" style="flex:1 1 140px;">
                        <label>Uang Kembalian</label>
                        <input type="text" id="kembalianDisplay" readonly value="Rp 0">
                    </div>
                </div>
            </div>

            <!-- Tombol Cetak -->
            <div class="print-btn-area">
                <button class="btn btn-success" id="btnCetak" style="font-size:1rem; padding:12px 28px;">
                    🖨️ Cetak Struk
                </button>
            </div>
        </div>

        <!-- Panel Preview (Kanan) -->
        <div class="panel-preview" id="panelPreview">
            <div class="receipt-wrapper" id="receiptWrapper">
                <div class="receipt-content" id="receiptContent">
                    <!-- Konten struk akan dimasukkan oleh JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
